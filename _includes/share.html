<!-- BEGIN: Share Buttons -->
{% assign absolute_url = site.url | append: site.baseurl | append: page.url %}
{% assign encoded_text = page.title | append: ' ' | append: absolute_url | url_encode %}

<div class="share-container" aria-label="שיתוף עמוד">
  <a
    class="share-btn"
    href="https://wa.me/?text={{ encoded_text }}"
    target="_blank"
    rel="noopener"
    aria-label="שיתוף בוואטסאפ">
    <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
      <path d="M20.52 3.48A11.83 11.83 0 0 0 12.07 0C5.48 0 .11 5.36.11 11.95c0 2.1.55 4.15 1.6 5.96L0 24l6.28-1.65a11.9 11.9 0 0 0 5.69 1.45h.01c6.59 0 11.96-5.36 11.96-11.95 0-3.19-1.24-6.19-3.42-8.37Zm-8.55 18.3h-.01a9.9 9.9 0 0 1-5.03-1.37l-.36-.22-3.73.98 1-3.64-.24-.37a9.9 9.9 0 0 1-1.52-5.21C2.08 6.48 6.53 2.03 12 2.03c2.66 0 5.15 1.04 7.03 2.92a9.86 9.86 0 0 1 2.92 7c0 5.48-4.46 9.93-9.98 9.93Zm5.45-7.45c-.3-.15-1.76-.87-2.03-.97-.27-.1-.47-.15-.67.15-.2.3-.77.97-.94 1.17-.17.2-.35.22-.65.07-.3-.15-1.26-.47-2.4-1.5-.89-.79-1.49-1.77-1.67-2.07-.17-.3-.02-.46.13-.61.13-.13.3-.35.45-.52.15-.17.2-.3.3-.5.1-.2.05-.37-.03-.52-.08-.15-.67-1.62-.92-2.22-.24-.58-.49-.5-.67-.5h-.57c-.2 0-.52.07-.79.37-.27.3-1.05 1.03-1.05 2.5s1.08 2.9 1.23 3.1c.15.2 2.12 3.24 5.13 4.54.72.31 1.28.5 1.72.64.72.23 1.37.2 1.89.12.58-.09 1.76-.72 2.01-1.41.25-.7.25-1.29.18-1.42-.07-.13-.27-.2-.57-.35Z"/>
    </svg>
  </a>

  <a
    class="share-btn"
    href="https://twitter.com/intent/tweet?text={{ encoded_text }}"
    target="_blank"
    rel="noopener"
    aria-label="שיתוף ב-X">
    <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
      <path d="M18.9 2H22l-6.77 7.74L23 22h-6.1l-4.78-6.24L6.66 22H3.55l7.24-8.28L1 2h6.26l4.32 5.72L18.9 2Zm-1.07 18h1.69L6.35 3.9H4.54L17.83 20Z"/>
    </svg>
  </a>

  <a
    class="share-btn"
    href="https://www.facebook.com/sharer/sharer.php?u={{ absolute_url }}"
    target="_blank"
    rel="noopener"
    aria-label="שיתוף בפייסבוק">
    <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
      <path d="M13.5 21v-8.25h2.77l.42-3.2H13.5V7.5c0-.93.26-1.56 1.6-1.56h1.71V3.08A23.1 23.1 0 0 0 14.31 3c-2.47 0-4.16 1.5-4.16 4.27v2.28H7.35v3.2h2.8V21h3.35Z"/>
    </svg>
  </a>

  <a
    class="share-btn"
    href="mailto:?subject={{ page.title | uri_escape }}&body={{ encoded_text }}"
    aria-label="שיתוף בדוא\"ל">
    <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
      <path d="M3 5h18a1 1 0 0 1 1 1v12a1 1 0 0 1-1 1H3a1 1 0 0 1-1-1V6a1 1 0 0 1 1-1Zm0 2v.51l9 5.4 9-5.4V7l-9 5.4L3 7Zm18 10V9.84l-8.49 5.09a1 1 0 0 1-1.02 0L3 9.84V17h18Z"/>
    </svg>
  </a>

  <button
    type="button"
    class="share-btn copy-link"
    data-url="{{ absolute_url }}"
    aria-label="העתקת קישור">
    <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
      <path d="M9 3a2 2 0 0 0-2 2v2h2V5h10v10h-2v2h2a2 2 0 0 0 2-2V5a2 2 0 0 0-2-2H9Zm-4 4a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2H5Zm0 2h10v10H5V9Z"/>
    </svg>
  </button>

  <span class="share-feedback" aria-live="polite">הקישור הועתק</span>
</div>

<script>
  document.addEventListener("DOMContentLoaded", function() {
    const shareContainers = document.querySelectorAll(".share-container");

    shareContainers.forEach(function(container) {
      const copyBtn = container.querySelector(".copy-link");
      const feedback = container.querySelector(".share-feedback");

      if (!copyBtn || !feedback) return;

      copyBtn.addEventListener("click", function() {
        const url = this.dataset.url;

        if (navigator.clipboard) {
          navigator.clipboard.writeText(url).then(showFeedback);
        } else {
          const temp = document.createElement("textarea");
          temp.value = url;
          document.body.appendChild(temp);
          temp.select();
          document.execCommand("copy");
          document.body.removeChild(temp);
          showFeedback();
        }
      });

      function showFeedback() {
        feedback.style.display = "inline";
        setTimeout(function() {
          feedback.style.display = "none";
        }, 1500);
      }
    });
  });
</script>
<!-- END: Share Buttons -->
