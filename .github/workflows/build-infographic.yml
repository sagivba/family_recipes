name: Build recipe infographic data

on:
  workflow_dispatch: {}
  push:
    paths:
      - "_recipes/*.md"
      - "_recipes/*.MD"
      - "code/build_recipes_info.py"
      - "code/_Tests/**"
      - ".github/workflows/build-infographic.yml"
      
permissions:
  contents: write

jobs:
  build-infographic:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pyyaml

      - name: Run extractor unit tests
        run: cd code && python -m unittest _Tests/test_build_recipes_info.py

      - name: Regenerate recipe metadata
        run: python code/build_recipes_info.py

      - name: Commit updated metadata if changed
        run: |
          if git diff --quiet -- infographic/recipes_info.json; then
            echo "No metadata changes detected."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add infographic/recipes_info.json
          git commit -m "chore: update recipes infographic data"
          git push
